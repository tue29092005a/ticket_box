  nginx:
    image: nginx:alpine
    container_name: ticketbox-nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ticketbox-network

  minio:
    image: minio/minio:latest
    container_name: ticketbox-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ticketbox_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ticketbox_secret_2026}
    ports:
      - "9000:9000"   # S3 API — Backend SDK + presigned PUT from browser
      - "9001:9001"   # MinIO Web Console (admin)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ticketbox-network

networks:
  ticketbox-network:
    driver: bridge

volumes:
  pgdata:
  mongodata:
  minio_data:


