events {
    worker_connections 1024;
}

http {
    # Logging format để dễ debug
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" -> $upstream_addr';
    access_log /var/log/nginx/access.log main;

    # Định nghĩa các Upstream (Máy chủ Backend)
    upstream auth_server {
        server host.docker.internal:3001;
    }
    
    upstream info_server {
        server host.docker.internal:3003;
    }
    
    upstream payment_server {
        server host.docker.internal:3004;
    }

    # Cluster Booking với Thuật toán Least Connections và Active Health Check
    upstream booking_servers {
        least_conn; # Luôn chọn cổng đang có ít người dùng nhất
        
        # max_fails=3: Thử 3 lần lỗi
        # fail_timeout=10s: Cấm cửa 10 giây nếu chết
        server host.docker.internal:3002 max_fails=3 fail_timeout=10s;
        server host.docker.internal:3012 max_fails=3 fail_timeout=10s;
        server host.docker.internal:3022 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;

        # Route tới Auth Service
        location /auth/ {
            proxy_pass http://auth_server/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_intercept_errors on;
            error_page 502 504 = @json_error_auth;
        }

        # Route tới Info Service
        location /info/ {
            proxy_pass http://info_server/info/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_intercept_errors on;
            error_page 502 504 = @json_error_info;
        }

        # Route tới Payment Service
        location /payment/ {
            proxy_pass http://payment_server/payment/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_intercept_errors on;
            error_page 502 504 = @json_error;
        }

        location @json_error {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' '*';
            return 502 '{"success": false, "message": "Cổng thanh toán đang bảo trì", "code": 502}';
        }

        location @json_error_auth {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' '*';
            return 502 '{"success": false, "message": "Hệ thống đăng nhập đang bảo trì. Bạn có thể xem thông tin nhưng chưa thể đăng nhập lúc này.", "code": 502}';
        }

        location @json_error_info {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' '*';
            return 502 '{"success": false, "message": "Hệ thống tải dữ liệu sự kiện đang nâng cấp. Vui lòng quay lại sau ít phút.", "code": 502}';
        }

        location @json_error_booking {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' '*';
            return 502 '{"success": false, "message": "Hệ thống đặt vé đang quá tải hoặc bảo trì. Vui lòng thử lại sau.", "code": 502}';
        }

        # Route tới Booking Service Cluster (Load Balancing & SSE)
        location /booking/ {
            proxy_pass http://booking_servers/booking/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── MinIO Object Storage proxy ──────────────────────────────────────
        # All browser presigned-PUT/GET traffic goes through here.
        # No CORS config needed on MinIO buckets — same origin as the API.
        location /minio/ {
            proxy_pass              http://host.docker.internal:9000/;
            proxy_set_header        Host $host;
            client_max_body_size    0;            # no Nginx limit — MinIO enforces via presigned params
            proxy_request_buffering off;          # stream directly, never buffer in memory
            proxy_read_timeout      600s;         # allow up to 500 MB CSV at ~1 MB/s
            proxy_send_timeout      600s;
        }

        # SSE requires special headers to keep connection open
        location /booking/sse/ {
            proxy_pass http://booking_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }
    }
}
