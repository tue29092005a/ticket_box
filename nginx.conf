events {
    worker_connections 1024;
}

http {
    upstream auth_cluster {
        server host.docker.internal:3001;
    }
    upstream booking_cluster {
        server host.docker.internal:3002;
    }
    upstream info_cluster {
        server host.docker.internal:3003;
    }

    server {
        listen 80;

        location /auth/ {
            proxy_pass http://auth_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /booking/ {
            proxy_pass http://booking_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /info/ {
            proxy_pass http://info_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /search/ {
            proxy_pass http://info_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Fallback for root (Frontend served from info-service or any)
        location / {
            proxy_pass http://info_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── MinIO Object Storage proxy ──────────────────────────────────────
        # All browser presigned-PUT/GET traffic goes through here.
        # No CORS config needed on MinIO buckets — same origin as the API.
        location /minio/ {
            proxy_pass              http://host.docker.internal:9000/;
            proxy_set_header        Host $host;
            client_max_body_size    0;            # no Nginx limit — MinIO enforces via presigned params
            proxy_request_buffering off;          # stream directly, never buffer in memory
            proxy_read_timeout      600s;         # allow up to 500 MB CSV at ~1 MB/s
            proxy_send_timeout      600s;
        }

        # SSE requires special headers to keep connection open
        location /booking/sse/ {
            proxy_pass http://booking_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
