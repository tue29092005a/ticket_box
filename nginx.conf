events {
    worker_connections 1024;
}

http {
    upstream auth_cluster {
        server host.docker.internal:3001;
    }
    upstream booking_cluster {
        server host.docker.internal:3002;
    }
    upstream info_cluster {
        server host.docker.internal:3003;
    }
    upstream payment_cluster {
        server host.docker.internal:3004;
    }

    server {
        listen 80;

        location /auth/ {
            proxy_pass http://auth_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /booking/ {
            proxy_pass http://booking_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /info/ {
            proxy_pass http://info_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /search/ {
            proxy_pass http://info_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /payment/ {
            proxy_pass http://payment_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Fallback for root (Frontend served from info-service or any)
        location / {
            proxy_pass http://info_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SSE requires special headers to keep connection open
        location /booking/sse/ {
            proxy_pass http://booking_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
