<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HA Cluster Test</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #111; color: #eee; }
    .container { display: flex; gap: 20px; margin-top: 20px; }
    .box { flex: 1; background: #222; padding: 15px; border-radius: 8px; border: 1px solid #444; }
    .log { height: 300px; overflow-y: auto; background: #000; padding: 10px; font-family: monospace; font-size: 13px; color: #0f0; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #e50914; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:hover { background: #b20710; }
  </style>
</head>
<body>

  <h2>Multi-Server Pub/Sub & SSE Test</h2>
  <p>Giao diện này giả lập 3 người dùng đang xem sơ đồ ghế ở 3 Server khác nhau.</p>
  
  <button id="bookBtn" onclick="bookRandomSeat()">🔥 GIỮ GHẾ NGẪU NHIÊN TẠI SERVER 3000</button>
  <p id="status"></p>

  <div class="container">
    <div class="box">
      <h3>Server 3000 (User A)</h3>
      <div id="log-3000" class="log">Đang đợi kết nối...<br></div>
    </div>
    <div class="box">
      <h3>Server 3001 (User B)</h3>
      <div id="log-3001" class="log">Đang đợi kết nối...<br></div>
    </div>
    <div class="box">
      <h3>Server 3002 (User C)</h3>
      <div id="log-3002" class="log">Đang đợi kết nối...<br></div>
    </div>
  </div>

  <script>
    let token = '';

    // Lấy Token giả lập
    async function init() {
      try {
        const res = await fetch('http://localhost:3000/auth/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email: `test_${Date.now()}@test.com`, password: 'pw' })
        });
        const data = await res.json();
        token = data.accessToken || data.token;
        setupSSE();
      } catch (e) {
        document.getElementById('status').innerText = "Lỗi khởi tạo. Hãy chắc chắn Cluster đang chạy!";
      }
    }

    function setupSSE() {
      const ports = [3000, 3001, 3002];
      ports.forEach((port, idx) => {
        const userId = `user_${idx}`;
        const es = new EventSource(`http://localhost:${port}/booking/sse/${userId}`);
        
        es.onmessage = (event) => {
          const logDiv = document.getElementById(`log-${port}`);
          const msg = JSON.parse(event.data);
          logDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg.message || msg.seatNo + ' ' + msg.status}<br>`;
          logDiv.scrollTop = logDiv.scrollHeight;
        };

        es.onopen = () => {
          document.getElementById(`log-${port}`).innerHTML += `<span style="color:yellow">[Đã kết nối luồng SSE tới cổng ${port}]</span><br>`;
        };
      });
    }

    async function bookRandomSeat() {
      const seatNo = `A-${Math.floor(Math.random() * 20) + 1}`;
      document.getElementById('status').innerText = `Đang gửi lệnh giữ ghế ${seatNo} tới Server 3000...`;
      
      try {
        const res = await fetch('http://localhost:3000/booking/svip', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ concert_id: 1, type: 'SVIP', quantity: 1, seatNo })
        });
        
        if(res.ok) {
          document.getElementById('status').innerHTML = `<span style="color:lime">Thành công! Đã đẩy lệnh giữ ghế ${seatNo}. Hãy nhìn 3 bảng bên dưới!</span>`;
        } else {
          document.getElementById('status').innerHTML = `<span style="color:red">Lỗi: Ghế ${seatNo} đã có người giữ. Hãy thử lại.</span>`;
        }
      } catch(e) {
        document.getElementById('status').innerText = "Lỗi kết nối API.";
      }
    }

    init();
  </script>
</body>
</html>
